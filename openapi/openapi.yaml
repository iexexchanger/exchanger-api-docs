components:
  securitySchemes:
    sanctumBearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: "Sanctum token in `Authorization: Bearer <token>` format."
    apiTimestamp:
      type: apiKey
      in: header
      name: X-Api-Timestamp
      description: Unix timestamp or ISO-8601 timestamp used by HMAC signed requests.
    apiNonce:
      type: apiKey
      in: header
      name: X-Api-Nonce
      description: Unique nonce per token within the signature time window.
    apiSignature:
      type: apiKey
      in: header
      name: X-Api-Signature
      description: Hex HMAC-SHA256 signature, optionally prefixed with `sha256=`.
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    PaginationMode:
      name: pagination
      in: query
      schema:
        type: string
        enum: [page, cursor]
        default: page
      description: Use `cursor` for large datasets. The first cursor page uses `pagination=cursor`; next pages use `cursor`.
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        nullable: true
      description: Opaque cursor returned in `meta.pagination.next_cursor`.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 191
      description: Makes unsafe requests safely repeatable for 24 hours by default.
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Client-defined id used to correlate API request and webhook events.
    WebhookId:
      name: webhook
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Success:
      description: Standard success envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessEnvelope"
    Error:
      description: Standard error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    SuccessEnvelope:
      type: object
      required: [state, message, result, meta]
      properties:
        state:
          type: integer
          enum: [0]
        message:
          type: string
        result:
          nullable: true
        meta:
          $ref: "#/components/schemas/Meta"
    ErrorEnvelope:
      type: object
      required: [state, message, code, error, meta]
      properties:
        state:
          type: integer
          enum: [1]
        message:
          type: string
        code:
          type: integer
          description: HTTP status code.
        error:
          type: object
          required: [code, type, details]
          properties:
            code:
              type: string
              description: Stable machine-readable API error code.
            type:
              type: string
              deprecated: true
              description: Backward-compatible alias of `error.code`.
            details:
              nullable: true
        meta:
          $ref: "#/components/schemas/Meta"
    Meta:
      type: object
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        timestamp:
          type: string
          format: date-time
        pagination:
          $ref: "#/components/schemas/Pagination"
    Pagination:
      type: object
      properties:
        mode:
          type: string
          enum: [page, cursor]
        current_page:
          type: integer
          nullable: true
        per_page:
          type: integer
        total:
          type: integer
          nullable: true
        last_page:
          type: integer
          nullable: true
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true
        cursor:
          type: string
          nullable: true
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        balance:
          type: object
        orders:
          type: object
        api_token:
          $ref: "#/components/schemas/ApiTokenSummary"
          nullable: true
    ApiScope:
      type: object
      required: [scope, group, title, description, risk, grantable, endpoints]
      properties:
        scope:
          type: string
          example: public-api:client:read
        group:
          type: string
          example: client
        title:
          type: string
          example: Client profile
        description:
          type: string
        risk:
          type: string
          enum: [low, standard, medium, high]
        grantable:
          type: boolean
        endpoints:
          type: array
          items:
            type: string
    ApiTokenSummary:
      type: object
