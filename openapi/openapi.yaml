      required: [card_number, file_intent]
      properties:
        order:
          type: string
          nullable: true
        order_id:
          type: string
          nullable: true
        currency_id:
          type: integer
          nullable: true
        card_number:
          type: string
        name:
          type: string
          nullable: true
        file_intent:
          type: string
          format: uuid
    OrderVerificationSubmitRequest:
      type: object
      properties:
        identity:
          $ref: "#/components/schemas/IdentityVerificationCreateRequest"
          nullable: true
        card:
          $ref: "#/components/schemas/CardVerificationCreateRequest"
          nullable: true
    ReviewCreateRequest:
      type: object
      required: [name, text]
      properties:
        name:
          type: string
          maxLength: 40
        text:
          type: string
          maxLength: 200
        rating:
          type: integer
          minimum: 1
          maximum: 5
        rate_speed:
          type: integer
          minimum: 1
          maximum: 5
        order_id:
          type: string
          nullable: true
        tracking_id:
          type: string
          nullable: true
      oneOf:
        - required: [order_id]
        - required: [tracking_id]
    Review:
      type: object
      properties:
        id:
          type: integer
        status:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
              enum: [published, moderation]
            is_published:
              type: boolean
        name:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        rating:
          type: integer
        order:
          type: object
          nullable: true
        timestamps:
          type: object
    ContractVersion:
      type: object
      required: [key, version, title, status, stability, description, headers, schemas]
      properties:
        key:
          type: string
          example: operation-contract
        version:
          type: string
          example: operation-contract-v1
        title:
          type: string
        status:
          type: string
          example: current
        stability:
          type: string
          example: stable
        description:
          type: string
        headers:
          type: array
          items:
            type: string
        schemas:
          type: array
          items:
            type: string
    SchemaRegistryItem:
      type: object
      required: [key, title, version, contract, content_type, endpoint]
      properties:
        key:
          type: string
          example: success-envelope.v1
        title:
          type: string
        version:
          type: string
        contract:
          type: string
        content_type:
          type: string
          example: application/schema+json
        endpoint:
          type: string
    ClientApiHealth:
      type: object
      required: [version, status, client, token, quota, security, webhooks, contracts, time]
      properties:
        version:
          type: string
          example: client-health-v1
        status:
          type: string
          enum: [ok, warning, blocked]
        client:
          type: object
          additionalProperties: true
        token:
          type: object
          nullable: true
          additionalProperties: true
        security:
          type: object
          nullable: true
          additionalProperties: true
        quota:
          type: object
          nullable: true
          additionalProperties: true
        webhooks:
          type: object
          additionalProperties: true
        contracts:
          type: object
          additionalProperties: true
        time:
          type: string
          format: date-time
    RouteCapabilities:
      type: object
      required: [version, route_id, status, actions, amounts, rate, fields, endpoints, snapshot]
      properties:
        version:
          type: string
          example: route-capabilities-v1
        route_id:
          type: integer
        status:
          type: object
          additionalProperties: true
        actions:
          type: object
          additionalProperties: true
        amounts:
          type: object
          additionalProperties: true
        rate:
          type: object
          additionalProperties: true
        fields:
          type: array
          items:
            type: object
            additionalProperties: true
        dynamic_fields:
          type: object
          additionalProperties: true
        requirements:
          $ref: "#/components/schemas/VerificationRequirements"
        files:
          type: object
          additionalProperties: true
        endpoints:
          type: object
          additionalProperties:
            type: string
        snapshot:
          $ref: "#/components/schemas/RouteSnapshot"
        operation_contract:
          $ref: "#/components/schemas/OperationContract"
    WebhookEvent:
      type: object
      required: [id, type, status, payload, deliveries_count]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: order.created
        resource:
          type: object
          additionalProperties: true
        status:
          type: string
        request_id:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        deliveries_count:
          type: integer
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/WebhookDelivery"
        created_at:
          type: string
          format: date-time
          nullable: true
    WebhookDelivery:
      type: object
      required: [id, status, attempt, endpoint, event]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, sending, succeeded, failed]
        attempt:
          type: integer
        endpoint:
          type: object
          nullable: true
          additionalProperties: true
        event:
          type: object
          nullable: true
          additionalProperties: true
        request:
          type: object
          additionalProperties: true
        response:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
    WebhookEventCatalogItem:
      type: object
      required: [event, title]
      properties:
        event:
          type: string
          example: order.status_changed
        title:
          type: string
    WebhookEndpoint:
      type: object
      required: [id, name, url, events, status, signing_algorithm]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, paused, disabled]
        signing_algorithm:
          type: string
          example: hmac-sha256-v1
        secret_fingerprint:
          type: string
          nullable: true
        failure_count:
          type: integer
        last_delivery_at:
          type: string
          format: date-time
          nullable: true
        last_success_at:
          type: string
          format: date-time
          nullable: true
        last_failure_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    WebhookEndpointCreate:
      type: object
      required: [name, url, events]
      properties:
        name:
          type: string
          maxLength: 80
        url:
          type: string
          format: uri
          maxLength: 500
        events:
          type: array
          minItems: 1
          items:
            type: string
    WebhookEndpointUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
        url:
          type: string
          format: uri
          maxLength: 500
        events:
          type: array
          minItems: 1
          items:
            type: string
        status:
          type: string
          enum: [active, paused, disabled]
    WebhookTestRequest:
      type: object
      properties:
        endpoint_id:
          type: string
          format: uuid
          nullable: true
        event_type:
          type: string
          example: api.test
        payload:
          type: object
          additionalProperties: true
    WebhookTestResult:
      type: object
      properties:
        event:
          type: object
          properties:
            id:
              type: string
              format: uuid
            type:
              type: string
            status:
              type: string
            request_id:
              type: string
            correlation_id:
              type: string
        deliveries:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              status:
                type: string
              endpoint_id:
                type: string
                format: uuid
