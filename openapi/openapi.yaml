openapi: 3.1.0
info:
  title: iEX Exchanger Public API
  version: 3.0.0
  description: >
    Public JSON API for client, order and partner integrations. Every JSON
    response uses the same envelope: state=0 for success, state=1 for errors.
    Private endpoints use Sanctum Bearer tokens. Tokens may also require
    HMAC-SHA256 request signing with X-Api-Timestamp, X-Api-Nonce and
    X-Api-Signature headers.
servers:
  - url: /api/v3
security:
  - sanctumBearer: []
tags:
  - name: System
  - name: Client
  - name: Orders
  - name: Exchange
  - name: Files
  - name: Verifications
  - name: Sandbox
  - name: Reviews
  - name: Partner
  - name: Platform
  - name: Webhooks
  - name: Security
paths:
  /ping:
    get:
      tags: [System]
      security: []
      summary: Public health ping
      responses:
        "200":
          description: API is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
  /openapi.yaml:
    get:
      tags: [System]
      security: []
      summary: OpenAPI YAML contract
      responses:
        "200":
          description: YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /public/contracts:
    get:
      tags: [Platform]
      security: []
      summary: Public contract version registry
      responses:
        "200":
          description: Current contract versions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          contracts:
                            type: array
                            items:
                              $ref: "#/components/schemas/ContractVersion"
  /public/contracts/{contract}:
    get:
      tags: [Platform]
      security: []
      summary: Show one public contract version
      parameters:
        - name: contract
          in: path
          required: true
          schema:
            type: string
            example: operation-contract
      responses:
        "200":
          description: Contract version.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          contract:
                            $ref: "#/components/schemas/ContractVersion"
        "404":
          $ref: "#/components/responses/Error"
  /public/schemas:
    get:
      tags: [Platform]
      security: []
      summary: Public JSON Schema registry
      responses:
        "200":
          description: JSON Schema catalog.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          schemas:
                            type: array
                            items:
                              $ref: "#/components/schemas/SchemaRegistryItem"
  /public/schemas/{schema}:
    get:
      tags: [Platform]
      security: []
      summary: Show one JSON Schema
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
            example: success-envelope.v1
      responses:
        "200":
          description: JSON Schema payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          schema:
                            type: object
                            additionalProperties: true
        "404":
          $ref: "#/components/responses/Error"
  /private/ping:
    get:
      tags: [System]
      summary: Authenticated health ping
      security:
        - sanctumBearer: []
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Error"
  /private/health/client:
    get:
      tags: [Platform]
      summary: Current client API health
      security:
        - sanctumBearer: ["public-api:client:health:read"]
      responses:
        "200":
          description: Client API diagnostics.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          health:
                            $ref: "#/components/schemas/ClientApiHealth"
        "403":
          $ref: "#/components/responses/Error"
  /private/contracts:
    get:
      tags: [Platform]
      summary: Authenticated contract version registry
      security:
        - sanctumBearer: ["public-api:contracts:read"]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Error"
  /private/contracts/{contract}:
    get:
      tags: [Platform]
      summary: Show authenticated contract version
      security:
        - sanctumBearer: ["public-api:contracts:read"]
      parameters:
        - name: contract
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /private/schemas:
    get:
      tags: [Platform]
      summary: Authenticated JSON Schema registry
      security:
        - sanctumBearer: ["public-api:schemas:read"]
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "403":
          $ref: "#/components/responses/Error"
  /private/schemas/{schema}:
    get:
      tags: [Platform]
      summary: Show authenticated JSON Schema
      security:
        - sanctumBearer: ["public-api:schemas:read"]
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
  /public/orders/statuses:
    get:
      tags: [Orders]
      security: []
      summary: Public order status dictionary
      responses:
        "200":
          $ref: "#/components/responses/Success"
  /private/scopes:
    get:
      tags: [Security]
      summary: List public API scopes
      security:
        - sanctumBearer: ["public-api:scopes:read"]
      responses:
        "200":
          description: Scope catalog.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          scopes:
                            type: array
                            items:
                              $ref: "#/components/schemas/ApiScope"
        "403":
          $ref: "#/components/responses/Error"
  /private/usage:
    get:
      tags: [Platform]
      summary: API usage, quota and billing summary
      security:
        - sanctumBearer: ["public-api:usage:read"]
      responses:
        "200":
          description: Current token usage summary.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/UsageSummary"
        "403":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /private/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      security:
        - sanctumBearer: ["public-api:webhooks:read"]
      responses:
        "200":
          description: Webhook endpoint list and event catalog.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          endpoints:
                            type: array
                            items:
                              $ref: "#/components/schemas/WebhookEndpoint"
                          events:
                            type: array
                            items:
                              $ref: "#/components/schemas/WebhookEventCatalogItem"
                          limits:
                            type: object
        "403":
          $ref: "#/components/responses/Error"
    post:
      tags: [Webhooks]
      summary: Create webhook endpoint
      security:
        - sanctumBearer: ["public-api:webhooks:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointCreate"
      responses:
        "201":
          description: Webhook endpoint with one-time secret.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          endpoint:
                            allOf:
                              - $ref: "#/components/schemas/WebhookEndpoint"
                              - type: object
                                properties:
                                  secret:
                                    type: string
                                    description: One-time webhook signing secret.
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /private/webhooks/test:
    post:
      tags: [Webhooks]
      summary: Create a test webhook event
      security:
        - sanctumBearer: ["public-api:webhooks:write"]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookTestRequest"
      responses:
        "201":
          description: Created webhook event and delivery ids.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/WebhookTestResult"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /private/webhooks/events:
    get:
      tags: [Webhooks]
      summary: List webhook events
      security:
        - sanctumBearer: ["public-api:webhooks:deliveries:read"]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/PaginationMode"
        - $ref: "#/components/parameters/Cursor"
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: filter[event_type]
          in: query
          schema:
            type: string
        - name: filter[resource_type]
          in: query
          schema:
            type: string
        - name: filter[resource_id]
          in: query
          schema:
            type: string
        - name: filter[correlation_id]
          in: query
          schema:
            type: string
        - name: filter[created_from]
          in: query
          schema:
            type: string
            format: date-time
        - name: filter[created_to]
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Webhook event list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          events:
                            type: array
                            items:
                              $ref: "#/components/schemas/WebhookEvent"
        "403":
          $ref: "#/components/responses/Error"
  /private/webhooks/events/{event}:
    get:
      tags: [Webhooks]
      summary: Show webhook event
      security:
        - sanctumBearer: ["public-api:webhooks:deliveries:read"]
      parameters:
        - name: event
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook event with deliveries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          event:
                            $ref: "#/components/schemas/WebhookEvent"
        "404":
          $ref: "#/components/responses/Error"
  /private/webhooks/deliveries:
    get:
      tags: [Webhooks]
      summary: List webhook delivery attempts
      security:
        - sanctumBearer: ["public-api:webhooks:deliveries:read"]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/PaginationMode"
        - $ref: "#/components/parameters/Cursor"
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: filter[endpoint_id]
          in: query
          schema:
            type: string
            format: uuid
        - name: filter[event_id]
          in: query
          schema:
            type: string
            format: uuid
        - name: filter[event_type]
          in: query
          schema:
            type: string
        - name: filter[correlation_id]
          in: query
          schema:
            type: string
        - name: filter[created_from]
          in: query
          schema:
            type: string
            format: date-time
        - name: filter[created_to]
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Webhook delivery list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          deliveries:
                            type: array
                            items:
                              $ref: "#/components/schemas/WebhookDelivery"
        "403":
          $ref: "#/components/responses/Error"
  /private/webhooks/deliveries/{delivery}:
    get:
      tags: [Webhooks]
      summary: Show webhook delivery attempt
      security:
        - sanctumBearer: ["public-api:webhooks:deliveries:read"]
      parameters:
        - name: delivery
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook delivery.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          delivery:
                            $ref: "#/components/schemas/WebhookDelivery"
        "404":
          $ref: "#/components/responses/Error"
  /private/webhooks/deliveries/{delivery}/retry:
    post:
      tags: [Webhooks]
      summary: Retry webhook delivery attempt
      security:
        - sanctumBearer: ["public-api:webhooks:deliveries:retry"]
      parameters:
        - name: delivery
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Delivery queued for retry.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          delivery:
                            $ref: "#/components/schemas/WebhookDelivery"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /private/webhooks/{webhook}:
    get:
      tags: [Webhooks]
      summary: Show webhook endpoint
      security:
        - sanctumBearer: ["public-api:webhooks:read"]
      parameters:
        - $ref: "#/components/parameters/WebhookId"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Webhooks]
      summary: Update webhook endpoint
      security:
        - sanctumBearer: ["public-api:webhooks:write"]
      parameters:
        - $ref: "#/components/parameters/WebhookId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Webhooks]
      summary: Delete webhook endpoint
      security:
        - sanctumBearer: ["public-api:webhooks:write"]
      parameters:
        - $ref: "#/components/parameters/WebhookId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /private/webhooks/{webhook}/rotate-secret:
    post:
      tags: [Webhooks]
      summary: Rotate webhook signing secret
      security:
        - sanctumBearer: ["public-api:webhooks:write"]
      parameters:
        - $ref: "#/components/parameters/WebhookId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Webhook endpoint with one-time new secret.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          endpoint:
                            allOf:
                              - $ref: "#/components/schemas/WebhookEndpoint"
                              - type: object
                                properties:
                                  secret:
                                    type: string
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /private/client:
    get:
      tags: [Client]
      summary: Current client profile
      security:
        - sanctumBearer: ["public-api:client:read"]
      responses:
        "200":
          description: Client profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/Client"
  /private/exchange/payment-systems:
    get:
      tags: [Exchange]
      summary: List active payment systems
      security:
        - sanctumBearer: ["public-api:exchange:routes:read"]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/PaginationMode"
        - $ref: "#/components/parameters/Cursor"
        - name: sort
          in: query
          schema:
            type: string
            example: sorting,id
        - name: filter[id]
          in: query
          schema:
            type: integer
        - name: filter[payment_id]
          in: query
          schema:
            type: integer
        - name: filter[code_currency_id]
          in: query
          schema:
            type: integer
        - name: filter[side]
          in: query
          schema:
            type: string
            enum: [give, receive, both]
        - name: filter[from_currency_id]
          in: query
          schema:
            type: integer
        - name: filter[to_currency_id]
          in: query
          schema:
            type: integer
        - name: filter[currency_code]
          in: query
          schema:
            type: string
            example: USDT
        - name: filter[letter_code]
          in: query
          schema:
            type: string
            example: USDTTRC20
        - name: filter[short_code]
          in: query
          schema:
            type: string
            example: USDT
        - name: filter[network]
          in: query
          schema:
            type: string
            example: TRON
      responses:
        "200":
          description: Active payment systems.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: array
                        items:
                          $ref: "#/components/schemas/PaymentSystem"
        "403":
          $ref: "#/components/responses/Error"
  /private/exchange/routes:
    get:
      tags: [Exchange]
      summary: List active exchange routes
      security:
        - sanctumBearer: ["public-api:exchange:routes:read"]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/PaginationMode"
        - $ref: "#/components/parameters/Cursor"
        - name: sort
          in: query
          schema:
            type: string
            example: sorting,id
        - name: filter[id]
          in: query
          schema:
            type: integer
        - name: filter[from_currency_id]
          in: query
          schema:
            type: integer
        - name: filter[to_currency_id]
          in: query
          schema:
            type: integer
        - name: filter[from]
          in: query
          schema:
            type: string
            example: USDT
        - name: filter[to]
          in: query
          schema:
            type: string
            example: USD
      responses:
        "200":
          description: Active exchange routes.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        type: array
                        items:
                          $ref: "#/components/schemas/ExchangeRoute"
        "403":
          $ref: "#/components/responses/Error"
  /private/exchange/routes/{route}:
    get:
      tags: [Exchange]
      summary: Show active exchange route
      security:
        - sanctumBearer: ["public-api:exchange:routes:read"]
      parameters:
        - name: route
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exchange route.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/ExchangeRoute"
        "404":
          $ref: "#/components/responses/Error"
  /private/exchange/routes/details:
    get:
      tags: [Exchange]
      summary: Show exchange route details by currency pair
      security:
        - sanctumBearer: ["public-api:exchange:routes:read"]
      parameters:
        - name: route_id
          in: query
          schema:
            type: integer
        - name: direction_id
          in: query
          schema:
            type: integer
        - name: from_currency_id
          in: query
          schema:
            type: integer
        - name: to_currency_id
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            example: USDT
        - name: to
          in: query
          schema:
            type: string
            example: USD
      responses:
        "200":
          description: Exchange route details compatible with client operation payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/ExchangeRouteDetail"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /private/exchange/routes/{route}/details:
    get:
      tags: [Exchange]
      summary: Show exchange route details by id
      security:
        - sanctumBearer: ["public-api:exchange:routes:read"]
      parameters:
        - name: route
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exchange route details compatible with client operation payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/ExchangeRouteDetail"
        "404":
          $ref: "#/components/responses/Error"
  /private/exchange/routes/{route}/capabilities:
    get:
      tags: [Exchange]
      summary: Show route capability matrix by id
      security:
        - sanctumBearer: ["public-api:exchange:capabilities:read"]
      parameters:
        - name: route
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Route capability matrix.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
